<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель модератора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Управление отзывами</span>
        </div>
    </nav>
    <div class="container">
        <table class="table table-hover border shadow-sm">
            <thead class="table-light">
                <tr>
                    <th>Дата</th>
                    <th>Категория</th>
                    <th>Тема</th>
                    <th>Статус</th>
                    <th>Приоритет</th>
                </tr>
            </thead>
            <tbody>
                {% for item in feedbacks %}
                <tr>
                    <td>{{ item.created_at[:10] }}</td>
                    <td>{{ item.cat_name }}</td>
                    <td>{{ item.title }}</td>
                    <td><span class="badge bg-secondary">{{ item.status }}</span></td>
                    <td>
                        {% if item.priority == 'Высокий' %}
                            <span class="badge rounded-circle bg-danger" style="width: 20px; height: 20px;"> </span>
                        {% else %}
                            <span class="badge rounded-circle bg-warning" style="width: 20px; height: 20px;"> </span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
