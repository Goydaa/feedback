<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between">
        <h2>Все отзывы</h2>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Выйти</a>
    </div>

    <table class="table table-striped mt-4">
        <thead>
            <tr>
                <th>Дата</th>
                <th>Автор</th>
                <th>Email</th>
                <th>Категория</th>
                <th>Текст</th>
            </tr>
        </thead>
        <tbody>
            {% for review in reviews %}
            <tr>
                <td>{{ review.timestamp.strftime('%d.%m %H:%M') }}</td>
                <td>{{ review.author }}</td>
                <td><a href="mailto:{{ review.email }}">{{ review.email }}</a></td>
                <td>{{ review.category.name }}</td>
                <td>{{ review.text }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">На главную</a>
</body>
</html>
