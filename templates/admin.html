<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Входящие отзывы</h2>
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Выйти</a>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="table-light">
            <tr>
                <th>Приоритет</th>
                <th>Дата</th>
                <th>Автор / Email</th>
                <th>Категория</th>
                <th>Сообщение</th>
            </tr>
        </thead>
        <tbody>
            {% for review in reviews %}
            <tr>
                <td>
                    <span class="dot bg-{{ review.priority_color }}"></span>
                    <small>{{ review.priority_label }}</small>
                </td>
                <td class="small">{{ review.timestamp.strftime('%d.%m %H:%M') }}</td>
                <td>
                    <strong>{{ review.author }}</strong><br>
                    <a href="mailto:{{ review.email }}" class="small text-muted">{{ review.email }}</a>
                </td>
                <td><span class="badge bg-light text-dark border">{{ review.category.name }}</span></td>
                <td>{{ review.text }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('index') }}" class="btn btn-link">Вернуться на сайт</a>
</body>
</html>
