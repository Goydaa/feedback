<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оставить отзыв</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Оставить отзыв об Академии</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="mt-4">
        <div class="mb-3">
            <input type="text" name="author" class="form-control" placeholder="Ваше имя" required>
        </div>
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Ваш Email (для ответа)" required>
        </div>
        <div class="mb-3">
            <select name="category_id" class="form-select">
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <textarea name="text" class="form-control" placeholder="Текст отзыва" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
    <br>
    <a href="{{ url_for('login') }}" class="text-muted">Панель управления</a>
</body>
</html>
